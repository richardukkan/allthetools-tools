<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel for Kids – Free Classroom & Family Spinner | Krystle Art Publications</title>
<meta name="description" content="Free spin the wheel for kids, teachers and parents. Ready-made presets for classroom activities, chores, games and family decisions. Add your own options. No sign up needed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff8f0;
  --card: #ffffff;
  --warm: #fff0e0;
  --ink: #2d1a08;
  --muted: #9a7a5a;
  --border: rgba(45,26,8,0.1);
  --pink: #ff6b9d;
  --blue: #4db8ff;
  --green: #5ecc8b;
  --yellow: #ffd93d;
  --purple: #c084fc;
  --orange: #ff9f4a;
  --red: #ff6b6b;
  --teal: #2dd4bf;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(circle, rgba(255,107,157,0.1) 2px, transparent 2px),
    radial-gradient(circle, rgba(77,184,255,0.08) 2px, transparent 2px);
  background-size: 44px 44px, 66px 66px;
  background-position: 0 0, 22px 22px;
}

.wrapper { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 28px 14px 60px; }

/* Header */
header { text-align: center; margin-bottom: 22px; }
.spin-icon { font-size: 40px; display: inline-block; animation: spinIcon 3s linear infinite; margin-bottom: 6px; }
@keyframes spinIcon { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
h1 { font-family: 'Fredoka One', sans-serif; font-size: clamp(30px,7vw,50px); line-height: 1; margin-bottom: 6px; }
h1 .pink { color: var(--pink); }
h1 .blue { color: var(--blue); }
.subtitle { font-size: 13px; font-weight: 600; color: var(--muted); }

/* Main layout */
.main-layout { display: flex; flex-direction: column; align-items: center; gap: 18px; }

/* LEFT — Wheel */
.wheel-col { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 440px; }

.wheel-wrap { position: relative; width: 100%; max-width: 380px; aspect-ratio: 1; }

/* Pointer */
.pointer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 32px;
  height: 32px;
  background: #fff;
  border-radius: 50%;
  border: 3px solid var(--ink);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* Outer arrow */
.arrow {
  position: absolute;
  top: 50%;
  right: -22px;
  transform: translateY(-50%);
  z-index: 11;
  width: 0;
  height: 0;
  border-top: 18px solid transparent;
  border-bottom: 18px solid transparent;
  border-right: 36px solid #ffffff;
  filter: drop-shadow(-3px 0px 0px #000) drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

.wheel-canvas-wrap {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 0 5px var(--ink), 6px 6px 0 var(--ink);
}

canvas#wheelCanvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 50%;
}

/* Spin button */
.spin-btn {
  width: 100%;
  max-width: 440px;
  padding: 16px;
  background: var(--pink);
  color: #fff;
  border: 2.5px solid var(--ink);
  border-radius: 16px;
  font-family: 'Fredoka One', sans-serif;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 5px 5px 0 var(--ink);
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
.spin-btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
.spin-btn:active { transform: translate(2px,2px); box-shadow: 3px 3px 0 var(--ink); }
.spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: 5px 5px 0 var(--ink); }

/* Result banner */
.result-banner {
  display: none;
  width: 100%;
  max-width: 440px;
  background: var(--yellow);
  border: 2.5px solid var(--ink);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
  box-shadow: 4px 4px 0 var(--ink);
  animation: popIn 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
}
.result-banner.show { display: block; }
.rb-emoji { font-size: 36px; display: block; margin-bottom: 4px; }
.rb-label { font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.rb-result { font-family: 'Fredoka One', sans-serif; font-size: clamp(22px,5vw,32px); color: var(--ink); line-height: 1.2; }

/* History */
.history-wrap {
  width: 100%;
  max-width: 440px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.hist-label { font-size: 10px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.hist-list { display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
.hist-item { font-size: 12px; font-weight: 700; color: var(--muted); padding: 3px 8px; background: var(--warm); border-radius: 6px; }
.hist-empty { font-size: 12px; color: var(--muted); opacity: 0.5; font-style: italic; }

/* RIGHT — Controls */
.controls-col { display: flex; flex-direction: row; flex-wrap: wrap; gap: 12px; width: 100%; max-width: 780px; }

.ctrl-card { background: var(--card); border: 2px solid var(--border); border-radius: 18px; padding: 16px; box-shadow: 3px 3px 0 rgba(45,26,8,0.07); flex: 1; min-width: 220px; }
.ctrl-label { font-family: 'Fredoka One', sans-serif; font-size: 15px; color: var(--ink); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* Preset buttons */
.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.preset-btn {
  width: 100%;
  padding: 8px 12px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--warm);
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
}
.preset-btn:hover { border-color: var(--pink); color: var(--pink); background: #fff5f8; }
.preset-btn.active { border-color: var(--pink); background: #fff0f5; color: var(--pink); }
.preset-icon { font-size: 15px; flex-shrink: 0; }
.preset-name { font-size: 11px; font-weight: 800; }
.preset-sub { font-size: 10px; opacity: 0.7; margin-top: 1px; }

/* Item editor */
.items-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; max-height: 220px; overflow-y: auto; }
.item-row { display: flex; gap: 6px; align-items: center; }
.item-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.item-input { flex: 1; padding: 7px 10px; background: var(--warm); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; color: var(--ink); outline: none; transition: border-color 0.15s; }
.item-input:focus { border-color: var(--pink); background: #fff; }
.item-del { width: 26px; height: 26px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--muted); opacity: 0.5; flex-shrink: 0; }
.item-del:hover { opacity: 1; color: var(--red); }

.add-item-btn { width: 100%; padding: 8px; background: transparent; border: 2px dashed var(--border); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.add-item-btn:hover { border-color: var(--green); color: var(--green); background: #f0fdf6; }

/* Speed */
.speed-row { display: flex; gap: 6px; }
.spd-btn { flex: 1; padding: 7px 4px; border: 2px solid var(--border); border-radius: 8px; background: var(--warm); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; }
.spd-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* Clear btn */
.clear-btn { width: 100%; padding: 9px; border: 2px solid var(--border); border-radius: 10px; background: var(--warm); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: var(--muted); cursor: pointer; transition: all 0.15s; min-width: 220px; flex: 1; }
.clear-btn:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }

/* Sound toggle */
.sound-toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--card); border: 2px solid var(--border); border-radius: 18px; box-shadow: 3px 3px 0 rgba(45,26,8,0.07); min-width: 220px; flex: 1; }
.sound-label { font-family: 'Fredoka One', sans-serif; font-size: 15px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
.toggle-wrap { display: flex; gap: 6px; }
.snd-btn { padding: 7px 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--warm); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.snd-btn.on.active  { background: var(--green); color: #fff; border-color: var(--green); }
.snd-btn.off.active { background: var(--red); color: #fff; border-color: var(--red); }

/* Confetti */
.confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
.cp { position: absolute; border-radius: 3px; animation: cfFall linear forwards; }
@keyframes cfFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

@keyframes popIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }

.footer-note { text-align: center; margin-top: 32px; font-size: 12px; color: #c4a87a; }
</style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="wrapper">

<header>
  <div class="spin-icon">🎡</div>
  <h1><span class="pink">Spin</span> the <span class="blue">Wheel!</span></h1>
  <p class="subtitle">For classrooms, families and kids! 🎉</p>
</header>

<div class="main-layout">

  <!-- LEFT — Wheel -->
  <div class="wheel-col">
    <div class="wheel-wrap">
      <div class="arrow"></div>
      <div class="wheel-canvas-wrap">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
      </div>
      <div class="pointer">⭐</div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎯 SPIN!</button>

    <div class="result-banner" id="resultBanner">
      <span class="rb-emoji" id="rbEmoji">🎉</span>
      <div class="rb-label">The wheel chose...</div>
      <div class="rb-result" id="rbResult">Spin the wheel!</div>
    </div>

    <div class="history-wrap">
      <div class="hist-label">📋 Recent Results</div>
      <div class="hist-list" id="histList">
        <div class="hist-empty">No spins yet!</div>
      </div>
    </div>
  </div>

  <!-- RIGHT — Controls -->
  <div class="controls-col">

    <!-- Presets -->
    <div class="ctrl-card">
      <div class="ctrl-label">⚡ Quick Presets</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <!-- Items editor -->
    <div class="ctrl-card">
      <div class="ctrl-label">✏️ Edit Options</div>
      <div class="items-list" id="itemsList"></div>
      <button class="add-item-btn" onclick="addItem('')">＋ Add option</button>
    </div>

    <!-- Speed -->
    <div class="ctrl-card">
      <div class="ctrl-label">💨 Spin Speed</div>
      <div class="speed-row">
        <button class="spd-btn" id="spd-slow" onclick="setSpeed('slow')">🐢 Slow</button>
        <button class="spd-btn active" id="spd-normal" onclick="setSpeed('normal')">🐇 Normal</button>
        <button class="spd-btn" id="spd-fast" onclick="setSpeed('fast')">⚡ Fast</button>
      </div>
    </div>

    <!-- Clear history -->
    <div class="sound-toggle">
      <div class="sound-label">🔊 Sound</div>
      <div class="toggle-wrap">
        <button class="snd-btn on active" id="sndOn" onclick="setSound(true)">ON</button>
        <button class="snd-btn off" id="sndOff" onclick="setSound(false)">OFF</button>
      </div>
    </div>

    <button class="clear-btn" onclick="clearHistory()">🗑️ Clear History</button>

  </div>
</div>

<p class="footer-note">krystleartpublications.com · Give it a spin! 🎡</p>
</div>

<script>
// ─── PRESETS ─────────────────────────────────────────────────────────────────
var PRESETS = [
  { icon:'🙋', name:'Pick a Student',   sub:'Random student selector',     items:['Student 1','Student 2','Student 3','Student 4','Student 5','Student 6','Student 7','Student 8'] },
  { icon:'🎮', name:'Break Time Fun',   sub:'Classroom break activities',   items:['Free Draw','Dance Break','Story Time','Yoga Stretch','Sing a Song','Show and Tell','Brain Break','Quiz Time'] },
  { icon:'🧹', name:'Chore Picker',     sub:'Family chores wheel',          items:['Tidy Bedroom','Set the Table','Wash Dishes','Vacuum','Feed Pets','Water Plants','Take Out Bins','Wipe Surfaces'] },
  { icon:'🍽️', name:'What\'s for Dinner',sub:'Family dinner decider',      items:['Pizza Night','Pasta','Stir Fry','Soup','Sandwiches','Burgers','Tacos','Omelette'] },
  { icon:'🎯', name:'Classroom Jobs',   sub:'Assign class roles',           items:['Line Leader','Door Holder','Board Cleaner','Register Helper','Librarian','Plant Waterer','Messenger','Timekeeper'] },
  { icon:'🏃', name:'P.E. Activity',    sub:'Physical education picker',    items:['Running Races','Skipping','Jumping Jacks','Hula Hoop','Tag','Obstacle Course','Ball Games','Stretching'] },
  { icon:'📖', name:'Reading Corner',   sub:'Choose what to read',          items:['Picture Book','Poetry','Comic Strip','Non-Fiction','Chapter Book','Magazine','Joke Book','Graphic Novel'] },
  { icon:'🎨', name:'Art Activity',     sub:'Creative time chooser',        items:['Colouring In','Painting','Clay Modelling','Collage','Drawing','Origami','Stamping','String Art'] },
  { icon:'🌍', name:'Topic Spinner',    sub:'Pick a lesson topic',          items:['Animals','Space','Weather','Oceans','Volcanoes','Rainforest','Ancient Egypt','The Human Body'] },
  { icon:'⭐', name:'Reward Chooser',   sub:'Pick a class reward',          items:['Extra Break','Movie Time','Free Choice','Outdoor Lesson','Show and Tell','Game Time','Sticker Sheet','Bring a Toy'] },
  { icon:'🎲', name:'Party Games',      sub:'Family party decider',         items:['Musical Chairs','Charades','Simon Says','Duck Duck Goose','Freeze Dance','Limbo','Balloon Pop','Hide and Seek'] },
  { icon:'✅', name:'Yes or No',        sub:'Simple decision maker',        items:['Yes! ✅','No! ❌','Maybe 🤔','Ask Again! 🔄','Definitely! 🌟','Not Today 😅'] },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
var COLORS = ['#ff6b9d','#4db8ff','#ffd93d','#5ecc8b','#c084fc','#ff9f4a','#2dd4bf','#ff6b6b','#a78bfa','#34d399','#fb923c','#60a5fa'];
var RESULT_EMOJIS = ['🎉','🌟','⭐','🏆','🎊','✨','🎯','🎈','💫','🥳'];

var items = ['Pick a Student','Free Draw','Chore Time','Pizza Night','P.E. Time','Read a Book','Art Attack','Yes!','No!','Maybe!'];
var spinning = false;
var currentAngle = 0;
var speed = 'normal';
var spinHistory = [];
var activePreset = -1;
var animId = null;

// ─── PRESETS RENDER ───────────────────────────────────────────────────────────
var presetGrid = document.getElementById('presetGrid');
PRESETS.forEach(function(p, i) {
  var btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.id = 'preset-' + i;
  btn.innerHTML =
    '<span class="preset-icon">' + p.icon + '</span>' +
    '<div><div class="preset-name">' + p.name + '</div><div class="preset-sub">' + p.sub + '</div></div>';
  btn.onclick = function() { loadPreset(i); };
  presetGrid.appendChild(btn);
});

function loadPreset(i) {
  activePreset = i;
  items = PRESETS[i].items.slice();
  document.querySelectorAll('.preset-btn').forEach(function(b, j) {
    b.className = 'preset-btn' + (j===i?' active':'');
  });
  renderItems();
  drawWheel();
}

// ─── ITEMS EDITOR ─────────────────────────────────────────────────────────────
function addItem(val) {
  if (items.length >= 20) return;
  items.push(val || '');
  renderItems();
  drawWheel();
  // Focus last input
  setTimeout(function() {
    var inputs = document.querySelectorAll('.item-input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function removeItem(i) {
  if (items.length <= 2) return;
  items.splice(i, 1);
  renderItems();
  drawWheel();
}

function updateItem(i, val) {
  items[i] = val;
  drawWheel();
}

function renderItems() {
  var list = document.getElementById('itemsList');
  list.innerHTML = '';
  items.forEach(function(item, i) {
    var row = document.createElement('div');
    row.className = 'item-row';
    var col = COLORS[i % COLORS.length];
    row.innerHTML =
      '<div class="item-dot" style="background:' + col + '"></div>' +
      '<input class="item-input" type="text" value="' + escHtml(item) + '" placeholder="Enter option..." oninput="updateItem(' + i + ', this.value)" maxlength="24">' +
      (items.length > 2 ? '<button class="item-del" onclick="removeItem(' + i + ')">✕</button>' : '<div style="width:26px"></div>');
    list.appendChild(row);
  });
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── SPEED ────────────────────────────────────────────────────────────────────
function setSpeed(s) {
  speed = s;
  ['slow','normal','fast'].forEach(function(v){
    document.getElementById('spd-'+v).className = 'spd-btn' + (v===s?' active':'');
  });
}

// ─── WHEEL DRAWING ────────────────────────────────────────────────────────────
var winnerIdx = -1; // track which segment is highlighted

function drawWheel() {
  var canvas = document.getElementById('wheelCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var cx = W/2, cy = H/2, r = W/2 - 4;
  ctx.clearRect(0, 0, W, H);

  var validItems = items.filter(function(it){ return it.trim(); });
  if (validItems.length < 2) validItems = ['Option A','Option B'];
  var n = validItems.length;
  var arc = (Math.PI * 2) / n;

  validItems.forEach(function(item, i) {
    var startAngle = currentAngle + i * arc;
    var endAngle = startAngle + arc;
    var color = COLORS[i % COLORS.length];
    var isWinner = (winnerIdx === i);

    // Segment — winner gets white overlay glow
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    if (isWinner) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }

    ctx.strokeStyle = '#fff';
    ctx.lineWidth = isWinner ? 3 : 2;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = (isWinner ? 'bold ' : 'bold ') + Math.min(16, Math.max(10, Math.floor(280/n))) + 'px Nunito, sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = isWinner ? 6 : 3;
    var label = item.length > 14 ? item.substring(0,13)+'…' : item;
    ctx.fillText(label, r - 14, 5);
    ctx.restore();
  });

  // Centre circle
  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#2d1a08';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ─── SPIN ─────────────────────────────────────────────────────────────────────
function spinWheel() {
  if (spinning) return;
  var validItems = items.filter(function(it){ return it.trim(); });
  if (validItems.length < 2) { alert('Please add at least 2 options!'); return; }

  spinning = true;
  winnerIdx = -1;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultBanner').className = 'result-banner';

  var speeds = { slow: 6, normal: 10, fast: 16 };
  var totalSpins = speeds[speed] + Math.random() * 4;
  var totalAngle = totalSpins * Math.PI * 2;
  var duration = { slow: 5000, normal: 4000, fast: 2500 }[speed];

  var startTime = null;
  var startAngle = currentAngle;
  var targetAngle = startAngle + totalAngle;

  function animate(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;
    var progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    var eased = 1 - Math.pow(1 - progress, 3);
    currentAngle = startAngle + totalAngle * eased;
    drawWheel();

    if (progress < 1) {
      // Tick sound as wheel passes segments
      var validItems2 = items.filter(function(it){ return it.trim(); });
      var n2 = validItems2.length;
      var arc2 = (Math.PI * 2) / n2;
      var prevSeg = Math.floor(((-(currentAngle - (totalAngle * (eased - 0.001))) + Math.PI*2*100) % (Math.PI*2)) / arc2);
      var currSeg = Math.floor(((-(currentAngle) + Math.PI*2*100) % (Math.PI*2)) / arc2);
      if (prevSeg !== currSeg) playTick();
      animId = requestAnimationFrame(animate);
    } else {
      currentAngle = targetAngle;
      drawWheel();
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      showResult(validItems);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(validItems) {
  var n = validItems.length;
  var arc = (Math.PI * 2) / n;
  // Arrow points from the RIGHT (3 o'clock = angle 0)
  // currentAngle rotates the wheel — find which segment sits at angle 0
  // Segment i occupies angles: currentAngle + i*arc  to  currentAngle + (i+1)*arc
  // At pointer (angle 0): find i where (0 - currentAngle) mod 2PI falls in [i*arc, (i+1)*arc]
  var normalised = ((-currentAngle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
  var idx = Math.floor(normalised / arc) % n;
  var winner = validItems[idx];
  winnerIdx = idx;
  drawWheel(); // redraw with highlight

  // Show banner
  var emoji = RESULT_EMOJIS[Math.floor(Math.random() * RESULT_EMOJIS.length)];
  document.getElementById('rbEmoji').textContent = emoji;
  document.getElementById('rbResult').textContent = winner;
  document.getElementById('resultBanner').className = 'result-banner show';

  // History
  spinHistory.unshift(emoji + ' ' + winner);
  if (spinHistory.length > 8) spinHistory.pop();
  renderHistory();
  launchConfetti();
  playFanfare();
}

function renderHistory() {
  var list = document.getElementById('histList');
  list.innerHTML = '';
  if (!spinHistory.length) {
    list.innerHTML = '<div class="hist-empty">No spins yet!</div>';
    return;
  }
  spinHistory.forEach(function(h, i) {
    var el = document.createElement('div');
    el.className = 'hist-item';
    el.textContent = (i+1) + '. ' + h;
    list.appendChild(el);
  });
}

function clearHistory() {
  spinHistory = [];
  renderHistory();
  document.getElementById('resultBanner').className = 'result-banner';
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti() {
  var wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  var cols = ['#ff6b9d','#4db8ff','#ffd93d','#5ecc8b','#c084fc','#ff9f4a','#ff6b6b'];
  for (var i=0;i<60;i++) {
    var p = document.createElement('div');
    p.className = 'cp';
    p.style.left = Math.random()*100 + '%';
    p.style.width = (5+Math.random()*8) + 'px';
    p.style.height = (5+Math.random()*8) + 'px';
    p.style.background = cols[Math.floor(Math.random()*cols.length)];
    p.style.animationDuration = (1.2+Math.random()*2) + 's';
    p.style.animationDelay = (Math.random()*0.6) + 's';
    wrap.appendChild(p);
  }
  setTimeout(function(){ wrap.innerHTML=''; }, 3500);
}

// ─── SOUND ────────────────────────────────────────────────────────────────────
var soundOn = true;
var audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function setSound(on) {
  soundOn = on;
  document.getElementById('sndOn').className  = 'snd-btn on'  + (on  ? ' active' : '');
  document.getElementById('sndOff').className = 'snd-btn off' + (!on ? ' active' : '');
}

function playTick() {
  if (!soundOn) return;
  try {
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.07);
  } catch(e) {}
}

function playFanfare() {
  if (!soundOn) return;
  try {
    var ctx = getAudioCtx();
    var notes = [523, 659, 784, 1047];
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      var t = ctx.currentTime + i * 0.12;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t);
      osc.stop(t + 0.28);
    });
  } catch(e) {}
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderItems();
drawWheel();
window.addEventListener('resize', drawWheel);
</script>

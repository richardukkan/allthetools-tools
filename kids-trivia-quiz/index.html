<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Trivia Quiz – Fun Quiz Questions for Children</title>
<meta name="description" content="Free kids trivia quiz with hundreds of questions across animals, space, nature, history, science, sport and more. Choose your age group and topic. No sign up needed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fef6ff;
  --card: #ffffff;
  --ink: #1a0a2e;
  --muted: #6b5c7a;
  --border: rgba(26,10,46,0.1);
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --yellow: #f59e0b;
  --yellow-light: #fef3c7;
  --green: #10b981;
  --green-light: #d1fae5;
  --red: #ef4444;
  --red-light: #fee2e2;
  --blue: #3b82f6;
  --blue-light: #dbeafe;
  --orange: #f97316;
  --pink: #ec4899;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* Floating background shapes */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(circle 200px at 10% 20%, rgba(124,58,237,0.08), transparent),
    radial-gradient(circle 150px at 90% 15%, rgba(245,158,11,0.1), transparent),
    radial-gradient(circle 180px at 80% 80%, rgba(16,185,129,0.08), transparent),
    radial-gradient(circle 120px at 15% 85%, rgba(236,72,153,0.08), transparent);
}

.wrapper { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 36px 16px 60px; }

/* Header */
header { text-align: center; margin-bottom: 28px; }
.star-row { font-size: 24px; letter-spacing: 8px; margin-bottom: 8px; animation: starWiggle 3s ease-in-out infinite; }
@keyframes starWiggle { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
h1 { font-family: 'Baloo 2', sans-serif; font-size: clamp(32px,8vw,54px); font-weight: 800; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, var(--purple), var(--pink), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.subtitle { font-size: 15px; font-weight: 600; color: var(--muted); }

/* Setup screen */
.setup-screen { animation: popUp 0.4s cubic-bezier(0.34,1.3,0.64,1) both; }
@keyframes popUp { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

.setup-card { background: var(--card); border: 2.5px solid var(--ink); border-radius: 24px; padding: 28px; margin-bottom: 16px; box-shadow: 5px 5px 0 var(--ink); }

.section-label { font-family: 'Baloo 2', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* Age selector */
.age-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
.age-btn { padding: 16px 8px 12px; border: 2.5px solid var(--border); border-radius: 16px; background: var(--bg); cursor: pointer; text-align: center; transition: all 0.15s; font-family: 'Nunito', sans-serif; }
.age-btn .a-emoji { font-size: 28px; display: block; margin-bottom: 4px; }
.age-btn .a-age { font-size: 14px; font-weight: 800; color: var(--ink); display: block; margin-bottom: 2px; }
.age-btn .a-hint { font-size: 10px; font-weight: 600; color: var(--muted); }
.age-btn:hover { transform: translateY(-3px); }
.age-btn.active { border-color: var(--purple); background: var(--purple-light); box-shadow: 3px 3px 0 var(--purple); }
.age-btn.active .a-age { color: var(--purple); }

/* Topic grid */
.topic-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
@media(max-width:480px){ .topic-grid { grid-template-columns: repeat(3, 1fr); } }
@media(max-width:360px){ .topic-grid { grid-template-columns: repeat(2, 1fr); } }

.topic-btn { padding: 12px 6px 10px; border: 2px solid var(--border); border-radius: 14px; background: var(--bg); cursor: pointer; text-align: center; transition: all 0.15s; font-family: 'Nunito', sans-serif; }
.topic-btn .t-icon { font-size: 22px; display: block; margin-bottom: 4px; }
.topic-btn .t-name { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.topic-btn:hover { transform: translateY(-2px); }
.topic-btn.active { border-width: 2.5px; box-shadow: 2px 2px 0; }
.topic-btn.active .t-name { font-weight: 900; }

/* Topic colours */
.topic-btn.t-animals.active  { border-color:#f97316; background:#fff7ed; box-shadow-color:#f97316; box-shadow:2px 2px 0 #f97316; }
.topic-btn.t-animals.active .t-name { color:#f97316; }
.topic-btn.t-space.active    { border-color:#7c3aed; background:#ede9fe; box-shadow:2px 2px 0 #7c3aed; }
.topic-btn.t-space.active .t-name { color:#7c3aed; }
.topic-btn.t-nature.active   { border-color:#10b981; background:#d1fae5; box-shadow:2px 2px 0 #10b981; }
.topic-btn.t-nature.active .t-name { color:#10b981; }
.topic-btn.t-science.active  { border-color:#3b82f6; background:#dbeafe; box-shadow:2px 2px 0 #3b82f6; }
.topic-btn.t-science.active .t-name { color:#3b82f6; }
.topic-btn.t-history.active  { border-color:#b45309; background:#fef3c7; box-shadow:2px 2px 0 #b45309; }
.topic-btn.t-history.active .t-name { color:#b45309; }
.topic-btn.t-sport.active    { border-color:#ef4444; background:#fee2e2; box-shadow:2px 2px 0 #ef4444; }
.topic-btn.t-sport.active .t-name { color:#ef4444; }
.topic-btn.t-food.active     { border-color:#ec4899; background:#fce7f3; box-shadow:2px 2px 0 #ec4899; }
.topic-btn.t-food.active .t-name { color:#ec4899; }
.topic-btn.t-geography.active{ border-color:#0891b2; background:#e0f2fe; box-shadow:2px 2px 0 #0891b2; }
.topic-btn.t-geography.active .t-name { color:#0891b2; }

/* Questions count */
.count-row { display: flex; gap: 8px; margin-bottom: 24px; }
.count-btn { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 12px; background: var(--bg); font-family: 'Baloo 2', sans-serif; font-size: 16px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all 0.15s; text-align: center; }
.count-btn.active { background: var(--yellow); color: var(--ink); border-color: var(--ink); box-shadow: 2px 2px 0 var(--ink); }

/* Start button */
.start-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; border: 2.5px solid var(--ink); border-radius: 16px; font-family: 'Baloo 2', sans-serif; font-size: 20px; font-weight: 800; cursor: pointer; box-shadow: 4px 4px 0 var(--ink); transition: all 0.15s; letter-spacing: 0.02em; }
.start-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
.start-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

/* Quiz screen */
.quiz-screen { display: none; }
.quiz-screen.show { display: block; animation: popUp 0.4s cubic-bezier(0.34,1.3,0.64,1) both; }

/* Progress bar */
.progress-wrap { margin-bottom: 20px; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-label { font-size: 13px; font-weight: 800; color: var(--muted); }
.progress-score { font-family: 'Baloo 2', sans-serif; font-size: 18px; font-weight: 800; color: var(--purple); }
.progress-bar-bg { height: 12px; background: var(--purple-light); border-radius: 999px; overflow: hidden; border: 1.5px solid var(--border); }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 999px; transition: width 0.5s ease; }

/* Question card */
.question-card { background: var(--card); border: 2.5px solid var(--ink); border-radius: 24px; padding: 28px; margin-bottom: 16px; box-shadow: 5px 5px 0 var(--ink); }
.q-topic-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 999px; border: 1.5px solid; margin-bottom: 16px; }
.q-number { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.q-text { font-family: 'Baloo 2', sans-serif; font-size: clamp(17px,3.5vw,22px); font-weight: 700; line-height: 1.4; color: var(--ink); margin-bottom: 20px; }

/* Answer buttons */
.answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:400px){ .answers-grid { grid-template-columns: 1fr; } }

.answer-btn { padding: 14px 12px; border: 2.5px solid var(--border); border-radius: 14px; background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); cursor: pointer; transition: all 0.18s; text-align: left; display: flex; align-items: center; gap: 10px; line-height: 1.3; }
.answer-btn .ans-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--purple-light); color: var(--purple); font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.answer-btn:hover:not(:disabled) { border-color: var(--purple); transform: translateY(-2px); box-shadow: 2px 2px 0 var(--purple); }
.answer-btn.correct { border-color: var(--green); background: var(--green-light); box-shadow: 3px 3px 0 var(--green); }
.answer-btn.correct .ans-letter { background: var(--green); color: #fff; }
.answer-btn.wrong { border-color: var(--red); background: var(--red-light); }
.answer-btn.wrong .ans-letter { background: var(--red); color: #fff; }
.answer-btn:disabled { cursor: not-allowed; }

/* Fun fact */
.fun-fact-card { background: var(--yellow-light); border: 2px solid var(--yellow); border-radius: 16px; padding: 14px 18px; margin-bottom: 12px; display: none; animation: slideDown 0.3s ease both; }
.fun-fact-card.show { display: block; }
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.ff-label { font-size: 10px; font-weight: 900; letter-spacing: 0.14em; text-transform: uppercase; color: var(--yellow); margin-bottom: 4px; }
.ff-text { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.6; }

/* Next button */
.next-btn { width: 100%; padding: 15px; background: var(--purple); color: #fff; border: 2.5px solid var(--ink); border-radius: 14px; font-family: 'Baloo 2', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; box-shadow: 3px 3px 0 var(--ink); transition: all 0.15s; display: none; }
.next-btn.show { display: block; animation: popUp 0.3s ease both; }
.next-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }

/* Results screen */
.results-screen { display: none; }
.results-screen.show { display: block; animation: popUp 0.5s cubic-bezier(0.34,1.3,0.64,1) both; }

.results-card { background: var(--card); border: 2.5px solid var(--ink); border-radius: 24px; padding: 32px; text-align: center; box-shadow: 5px 5px 0 var(--ink); margin-bottom: 16px; }
.result-emoji { font-size: 64px; margin-bottom: 12px; display: block; animation: bounce 1s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.result-title { font-family: 'Baloo 2', sans-serif; font-size: clamp(28px,6vw,42px); font-weight: 800; margin-bottom: 6px; }
.result-score { font-family: 'Baloo 2', sans-serif; font-size: clamp(40px,10vw,64px); font-weight: 800; color: var(--purple); line-height: 1; margin-bottom: 4px; }
.result-out-of { font-size: 16px; font-weight: 700; color: var(--muted); margin-bottom: 20px; }
.result-message { font-size: 16px; font-weight: 700; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

.stars-row { display: flex; justify-content: center; gap: 6px; font-size: 36px; margin-bottom: 20px; }
.star { transition: transform 0.3s ease; }
.star.lit { animation: starPop 0.4s cubic-bezier(0.34,1.4,0.64,1) both; }
@keyframes starPop { from{transform:scale(0)} to{transform:scale(1)} }

.result-actions { display: flex; flex-direction: column; gap: 10px; }
.res-btn { width: 100%; padding: 15px; border: 2.5px solid var(--ink); border-radius: 14px; font-family: 'Baloo 2', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.res-btn-primary { background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; box-shadow: 3px 3px 0 var(--ink); }
.res-btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }
.res-btn-secondary { background: var(--bg); color: var(--ink); }
.res-btn-secondary:hover { background: var(--yellow-light); }

/* Confetti burst */
.confetti-burst { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.footer-note { text-align: center; margin-top: 32px; font-size: 12px; color: #b0a8c0; }
</style>
</head>
<body>
<div class="wrapper">

<header>
  <div class="star-row">⭐🌟✨🌟⭐</div>
  <h1>Kids Trivia Quiz!</h1>
  <p class="subtitle">How much do you know? Let's find out! 🧠</p>
</header>

<!-- Setup Screen -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-card">

    <div class="section-label">👶 Choose your age group</div>
    <div class="age-grid">
      <button class="age-btn" id="age-young" onclick="setAge('young')">
        <span class="a-emoji">🐣</span>
        <span class="a-age">Ages 4–6</span>
        <span class="a-hint">Super easy!</span>
      </button>
      <button class="age-btn active" id="age-mid" onclick="setAge('mid')">
        <span class="a-emoji">🐥</span>
        <span class="a-age">Ages 7–9</span>
        <span class="a-hint">Medium fun</span>
      </button>
      <button class="age-btn" id="age-older" onclick="setAge('older')">
        <span class="a-emoji">🦅</span>
        <span class="a-age">Ages 10–12</span>
        <span class="a-hint">Challenging!</span>
      </button>
    </div>

    <div class="section-label">🎯 Pick a topic</div>
    <div class="topic-grid">
      <button class="topic-btn t-animals active" id="topic-animals" onclick="setTopic('animals')">
        <span class="t-icon">🐘</span><span class="t-name">Animals</span>
      </button>
      <button class="topic-btn t-space" id="topic-space" onclick="setTopic('space')">
        <span class="t-icon">🚀</span><span class="t-name">Space</span>
      </button>
      <button class="topic-btn t-nature" id="topic-nature" onclick="setTopic('nature')">
        <span class="t-icon">🌿</span><span class="t-name">Nature</span>
      </button>
      <button class="topic-btn t-science" id="topic-science" onclick="setTopic('science')">
        <span class="t-icon">🔬</span><span class="t-name">Science</span>
      </button>
      <button class="topic-btn t-history" id="topic-history" onclick="setTopic('history')">
        <span class="t-icon">🏛️</span><span class="t-name">History</span>
      </button>
      <button class="topic-btn t-sport" id="topic-sport" onclick="setTopic('sport')">
        <span class="t-icon">⚽</span><span class="t-name">Sport</span>
      </button>
      <button class="topic-btn t-food" id="topic-food" onclick="setTopic('food')">
        <span class="t-icon">🍕</span><span class="t-name">Food</span>
      </button>
      <button class="topic-btn t-geography" id="topic-geography" onclick="setTopic('geography')">
        <span class="t-icon">🌍</span><span class="t-name">Geography</span>
      </button>
    </div>

    <div class="section-label">🔢 Number of questions</div>
    <div class="count-row">
      <button class="count-btn" id="cnt-5" onclick="setCount(5)">5</button>
      <button class="count-btn active" id="cnt-10" onclick="setCount(10)">10</button>
      <button class="count-btn" id="cnt-15" onclick="setCount(15)">15</button>
      <button class="count-btn" id="cnt-20" onclick="setCount(20)">20</button>
    </div>

    <button class="start-btn" onclick="startQuiz()">🎮 Start the Quiz!</button>
  </div>
</div>

<!-- Quiz Screen -->
<div class="quiz-screen" id="quizScreen">
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label" id="progressLabel">Question 1 of 10</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="progress-score" id="progressScore">⭐ 0</span>
        <button onclick="quitQuiz()" style="padding:5px 12px;background:transparent;border:1.5px solid var(--border);border-radius:999px;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">✕ Quit</button>
      </div>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="question-card">
    <div class="q-topic-badge" id="qTopicBadge"></div>
    <div class="q-text" id="qText">Loading question...</div>
    <div class="answers-grid" id="answersGrid"></div>
  </div>

  <div class="fun-fact-card" id="funFactCard">
    <div class="ff-label">💡 Fun Fact!</div>
    <div class="ff-text" id="funFactText"></div>
  </div>

  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
</div>

<!-- Results Screen -->
<div class="results-screen" id="resultsScreen">
  <div class="results-card">
    <span class="result-emoji" id="resultEmoji">🏆</span>
    <div class="result-title" id="resultTitle">Amazing!</div>
    <div class="result-score" id="resultScore">10</div>
    <div class="result-out-of" id="resultOutOf">out of 10</div>
    <div class="stars-row" id="starsRow"></div>
    <div class="result-message" id="resultMessage"></div>
    <div class="result-actions">
      <button class="res-btn res-btn-primary" onclick="playAgainSameTopic()">🔄 Play Again — Same Topic</button>
      <button class="res-btn res-btn-secondary" onclick="goToSetup()">🎯 Choose a Different Topic</button>
    </div>
  </div>
</div>

<div class="confetti-burst" id="confettiBurst"></div>
<p class="footer-note">thatsthetool.com · Keep learning, keep playing! 🌟</p>
</div>

<script>
var currentAge = 'mid';
var currentTopic = 'animals';
var questionCount = 10;
var currentQuestions = [];
var currentQIndex = 0;
var score = 0;
var answered = false;

// ─── QUESTION BANK ───────────────────────────────────────────────────────────
var QUESTIONS = {
  animals: {
    young: [
      { q: "What sound does a cow make?", a: ["Moo","Woof","Meow","Quack"], correct: 0, fact: "Cows can recognize over 100 different faces of other cows!" },
      { q: "How many legs does a dog have?", a: ["2","4","6","8"], correct: 1, fact: "Dogs have 4 legs and can run up to 45 km/h!" },
      { q: "What do caterpillars turn into?", a: ["Frogs","Butterflies","Birds","Fish"], correct: 1, fact: "A caterpillar grows into a butterfly inside a cocoon called a chrysalis!" },
      { q: "What is a baby dog called?", a: ["Kitten","Cub","Puppy","Foal"], correct: 2, fact: "Puppies are born with their eyes and ears closed — they open after about 2 weeks!" },
      { q: "Which animal has a very long neck?", a: ["Elephant","Giraffe","Lion","Hippo"], correct: 1, fact: "A giraffe's neck can be up to 1.8 metres long!" },
      { q: "What do bees make?", a: ["Milk","Honey","Juice","Butter"], correct: 1, fact: "A single bee makes only about 1/12 of a teaspoon of honey in its whole life!" },
      { q: "Where do penguins live?", a: ["Desert","Jungle","Cold icy places","Hot beaches"], correct: 2, fact: "Most penguins live in Antarctica where temperatures can drop to minus 60 degrees!" },
      { q: "What is the largest land animal?", a: ["Lion","Elephant","Giraffe","Hippo"], correct: 1, fact: "African elephants are the largest land animals — they can weigh up to 7,000 kg!" },
      { q: "What do frogs lay?", a: ["Eggs","Baby frogs","Seeds","Bubbles"], correct: 0, fact: "A frog can lay up to 20,000 eggs at one time!" },
      { q: "Which animal is the fastest on land?", a: ["Horse","Lion","Cheetah","Ostrich"], correct: 2, fact: "Cheetahs can run at 112 km/h — faster than a car on a motorway!" },
      { q: "What do fish use to breathe?", a: ["Lungs","Gills","Nose","Skin"], correct: 1, fact: "Fish use gills to take oxygen from the water — just like we use lungs to breathe air!" },
      { q: "Which bird cannot fly?", a: ["Eagle","Parrot","Penguin","Robin"], correct: 2, fact: "Penguins can't fly but they are excellent swimmers — they can swim at 25 km/h!" },
      { q: "What is a baby cat called?", a: ["Puppy","Kitten","Cub","Foal"], correct: 1, fact: "Kittens are born blind and deaf and depend entirely on their mother for several weeks!" },
      { q: "Where does a snail carry its home?", a: ["In its mouth","On its back","Underground","In a tree"], correct: 1, fact: "A snail's shell is actually part of its body — it grows with the snail!" },
      { q: "What is the tallest bird in the world?", a: ["Flamingo","Penguin","Ostrich","Peacock"], correct: 2, fact: "Ostriches are 2.7 metres tall and can run at 70 km/h — the fastest running bird!" }
    ,
      { q: "What colour is a flamingo?", a: ["White", "Blue", "Pink", "Green"], correct: 2, fact: "Flamingos are born grey and white \u2014 they turn pink from the shrimp and algae they eat!" },

// ─── STATE ───────────────────────────────────────────────────────────────────
function setAge(a) {
  currentAge = a;
  ['young','mid','older'].forEach(function(v){
    document.getElementById('age-'+v).className = 'age-btn' + (v===a?' active':'');
  });
}

function setTopic(t) {
  currentTopic = t;
  document.querySelectorAll('.topic-btn').forEach(function(b){ b.className = b.className.replace(' active',''); });
  document.getElementById('topic-'+t).className += ' active';
}

function setCount(n) {
  questionCount = n;
  [5,10,15,20].forEach(function(v){
    document.getElementById('cnt-'+v).className = 'count-btn' + (v===n?' active':'');
  });
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i>0; i--) { var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}

function startQuiz() {
  var pool = QUESTIONS[currentTopic][currentAge] || [];
  if (!pool.length) {
    alert('Questions coming soon for this combination! Try a different topic or age group.');
    return;
  }
  currentQuestions = shuffle(pool).slice(0, Math.min(questionCount, pool.length));
  currentQIndex = 0;
  score = 0;
  answered = false;

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('quizScreen').className = 'quiz-screen show';
  document.getElementById('resultsScreen').className = 'results-screen';
  showQuestion();
}

function showQuestion() {
  var q = currentQuestions[currentQIndex];
  var cfg = TOPIC_CONFIG[currentTopic];
  var total = currentQuestions.length;
  answered = false;

  // Progress
  document.getElementById('progressLabel').textContent = 'Question ' + (currentQIndex+1) + ' of ' + total;
  document.getElementById('progressScore').textContent = '⭐ ' + score;
  document.getElementById('progressFill').style.width = (currentQIndex / total * 100) + '%';

  // Badge
  var badge = document.getElementById('qTopicBadge');
  badge.textContent = cfg.icon + ' ' + cfg.name;
  badge.style.borderColor = cfg.color;
  badge.style.color = cfg.color;
  badge.style.background = cfg.bg;

  // Question
  document.getElementById('qText').textContent = q.q;

  // Answers
  var grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  var letters = ['A','B','C','D'];
  var shuffledAnswers = q.a.map(function(text, origIdx){ return {text:text, origIdx:origIdx}; });
  // Don't shuffle — keep original order
  shuffledAnswers.forEach(function(ans, i) {
    var btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = '<span class="ans-letter">'+letters[i]+'</span><span>'+ans.text+'</span>';
    btn.onclick = function(){ selectAnswer(ans.origIdx, btn, q.correct); };
    grid.appendChild(btn);
  });

  // Hide fun fact and next
  document.getElementById('funFactCard').className = 'fun-fact-card';
  document.getElementById('nextBtn').className = 'next-btn';
}

function selectAnswer(selectedIdx, btn, correctIdx) {
  if (answered) return;
  answered = true;

  var grid = document.getElementById('answersGrid');
  var allBtns = grid.querySelectorAll('.answer-btn');

  allBtns.forEach(function(b){ b.disabled = true; });

  if (selectedIdx === correctIdx) {
    btn.classList.add('correct');
    score++;
    document.getElementById('progressScore').textContent = '⭐ ' + score;
  } else {
    btn.classList.add('wrong');
    allBtns[correctIdx].classList.add('correct');
  }

  // Show fun fact
  var q = currentQuestions[currentQIndex];
  if (q.fact) {
    document.getElementById('funFactText').textContent = q.fact;
    document.getElementById('funFactCard').className = 'fun-fact-card show';
  }

  // Show next button
  var nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = currentQIndex < currentQuestions.length - 1 ? 'Next Question →' : 'See My Results! 🎉';
  nextBtn.className = 'next-btn show';
}

function nextQuestion() {
  currentQIndex++;
  if (currentQIndex >= currentQuestions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('quizScreen').className = 'quiz-screen';
  document.getElementById('resultsScreen').className = 'results-screen show';

  var total = currentQuestions.length;
  var pct = score / total;
  var res = RESULTS.find(function(r){ return pct >= r.min && pct < r.max; }) || RESULTS[RESULTS.length-1];

  document.getElementById('resultEmoji').textContent = res.emoji;
  document.getElementById('resultTitle').textContent = res.title;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultOutOf').textContent = 'out of ' + total;
  document.getElementById('resultMessage').textContent = res.msg;

  // Stars
  var stars = Math.round(pct * 5);
  var starsHTML = '';
  for (var i = 0; i < 5; i++) {
    var lit = i < stars;
    starsHTML += '<span class="star' + (lit?' lit':'') + '" style="' + (lit?'':'filter:grayscale(1);opacity:0.3') + ';animation-delay:'+(i*0.1)+'s">' + (lit?'⭐':'⭐') + '</span>';
  }
  document.getElementById('starsRow').innerHTML = starsHTML;

  // Progress
  document.getElementById('progressFill').style.width = '100%';

  if (score >= total * 0.8) launchConfetti();
}

function launchConfetti() {
  var burst = document.getElementById('confettiBurst');
  burst.innerHTML = '';
  var colours = ['#7c3aed','#f59e0b','#10b981','#ef4444','#ec4899','#3b82f6','#f97316'];
  for (var i = 0; i < 60; i++) {
    var piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100 + '%';
    piece.style.background = colours[Math.floor(Math.random()*colours.length)];
    piece.style.animationDuration = (1.5 + Math.random()*2) + 's';
    piece.style.animationDelay = (Math.random()*0.5) + 's';
    piece.style.width = (6 + Math.random()*8) + 'px';
    piece.style.height = (6 + Math.random()*8) + 'px';
    burst.appendChild(piece);
  }
  setTimeout(function(){ burst.innerHTML = ''; }, 3500);
}

function playAgainSameTopic() {
  document.getElementById('resultsScreen').className = 'results-screen';
  document.getElementById('quizScreen').className = 'quiz-screen show';
  startQuiz();
}

function goToSetup() {
  document.getElementById('resultsScreen').className = 'results-screen';
  document.getElementById('setupScreen').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function quitQuiz() {
  if (confirm('Quit the quiz and go back to the start?')) {
    document.getElementById('quizScreen').className = 'quiz-screen';
    document.getElementById('setupScreen').style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
  }
}
</script>
</body>
</html>
